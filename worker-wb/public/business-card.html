<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Alley AI • Business Card Scanner</title>

<link rel="stylesheet" href="business-card.css">
</head>

<body>

<div class="app">

<header class="topbar">

<div class="brand">
<div class="logo">A</div>

<div>
<h1>Alley AI</h1>
<span>Vision Business Card Scanner</span>
</div>
</div>

<div class="status online">
<span class="dot"></span>
Vision API Online
</div>

</header>

<div class="layout">

<section class="camera-panel">

<div class="camera-frame">

<video
id="preview"
autoplay
playsinline
muted
></video>

<canvas
id="captureCanvas"
hidden
></canvas>

<div class="overlay">

<div class="card-guide">

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

</div>

</div>

<div id="spinner" class="spinner hidden">

<div class="loader"></div>

<p>Scanning Business Card…</p>

</div>

</div>

<div class="controls">

<button id="startCamera" class="primary">

📷 Start Camera

</button>

<button id="capture" disabled>

Capture

</button>

<button id="retake">

Retake

</button>

</div>

</section>

<aside class="results">

<h2>Extracted Contact</h2>

<div class="field">

<label>Name</label>

<input id="name">

</div>

<div class="field">

<label>Company</label>

<input id="company">

</div>

<div class="field">

<label>Title</label>

<input id="title">

</div>

<div class="field">

<label>Email</label>

<input id="email">

</div>

<div class="field">

<label>Phone</label>

<input id="phone">

</div>

<div class="field">

<label>Website</label>

<input id="website">

</div>

<div class="field">

<label>Address</label>

<textarea id="address"></textarea>

</div>

<details>

<summary>Raw OCR Output</summary>

<pre id="raw"></pre>

</details>

<div class="actions">

<button id="createLead" class="success">

Create Lead

</button>

</div>

</aside>

</div>

</div>

<script src="business-card.js"></script>

</body>
</html>
