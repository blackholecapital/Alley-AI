<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alley ai-Assistant — Operator Shell</title>
  <style>
    /* Minimal additive styles for S3 state surfaces only.
       The existing shell layout (status bar, transcript / response panes,
       input footer) is preserved from worker-wb/public/index.html.

       S5 UI completion pass (Stage 4 Worker A): tightened spacing,
       mode-aware status row, obvious voice & calendar entry points,
       stacked-pane mobile layout. Structure and DOM hooks are preserved —
       styling only. See /job_site/ui_stage4_direction.txt. */

    /* ── Design tokens ─────────────────────────────────────────────── */
    :root {
      --header-h:     42px;
      --footer-h:     52px;
      --accent:       #4da3ff;
      --accent-soft:  #1a2d3d;
      --ok:           #7cdc7c;
      --ok-soft:      #1a3d1f;
      --warn:         #f0c674;
      --warn-soft:    #3d2a1a;
      --bad:          #ff6b6b;
      --bad-soft:     #3d1f1f;
      --rec:          #ff6b6b;
      --bg:           #0f1115;
      --surface:      #15181e;
      --surface-2:    #1a1d23;
      --line:         #2a2d34;
      --line-2:       #3a3d44;
      --text:         #e6e8eb;
      --text-dim:     #a5a9b3;
      --text-muted:   #6b6f78;
      --chat-bar-h:   44px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           margin: 0; background: var(--bg); color: var(--text); }

    /* ── Status bar ────────────────────────────────────────────────── */
    .status-bar { display: flex; gap: 10px; align-items: center;
                  padding: 8px 12px; height: var(--header-h);
                  background: var(--surface-2);
                  border-bottom: 1px solid var(--line); font-size: 13px;
                  position: sticky; top: 0; z-index: 20;
                  overflow-x: auto; white-space: nowrap; }
    .status-title { font-weight: 600; letter-spacing: .2px; }
    .status-divider { color: #555; }
    .status-item { color: var(--text-dim); }
    .status-value { color: var(--text); font-variant-numeric: tabular-nums; }
    .status-value[data-state="live"]    { color: var(--ok); }
    .status-value[data-state="empty"]   { color: var(--text-dim); }
    .status-value[data-state="loading"] { color: var(--warn); }
    .status-value[data-state="error"]   { color: var(--bad); }
    .monospace { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

    #last-event-marker {
      margin-left: auto;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--line);
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ── Main panels ──────────────────────────────────────────────────
       Panes shrink to leave room for the voice footer. The grid is
       two-column on desktop and stacks to two rows on mobile so the
       chat/voice/calendar surfaces remain visible without horizontal
       scroll. Structure is preserved. */
    .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
              padding: 8px; height: calc(100vh - var(--header-h) - var(--chat-bar-h) - var(--footer-h));
              box-sizing: border-box; }
    .pane { display: flex; flex-direction: column;
            background: var(--surface); border: 1px solid var(--line);
            border-radius: 8px; min-height: 0; }
    .pane-header { padding: 8px 12px; border-bottom: 1px solid var(--line);
                   display: flex; align-items: center; justify-content: space-between;
                   gap: 8px; }
    .pane-label { font-weight: 600; font-size: 13px;
                  display: inline-flex; align-items: center; gap: 6px; }
    .pane-label::before {
      content: ""; width: 8px; height: 8px; border-radius: 999px;
      background: var(--text-muted); flex-shrink: 0;
    }
    #pane-transcript .pane-label::before { background: var(--accent); }
    #pane-response   .pane-label::before { background: var(--ok); }
    .pane-body { flex: 1 1 auto; overflow-y: auto; padding: 8px 12px; }
    .pane-placeholder { color: var(--text-muted); font-style: italic; margin: 0; }

    .entry { padding: 6px 8px; margin: 4px 0; border-radius: 6px;
             background: var(--surface-2); }
    .entry-inbound  { border-left: 3px solid var(--accent); }
    .entry-outbound { border-left: 3px solid var(--ok); }
    .entry-body { white-space: pre-wrap; word-break: break-word; }
    .entry-meta { margin-top: 2px; font-size: 11px; color: var(--text-muted); }

    /* S5: voice / kind badge */
    .entry-kind-badge { font-size: 10px; color: var(--text-muted); margin-bottom: 2px;
                        text-transform: uppercase; letter-spacing: .04em; }

    /* S5: calendar action bar */
    .calendar-action-bar { display: flex; align-items: center; gap: 8px;
                           padding: 4px 12px; background: var(--surface-2);
                           border-bottom: 1px solid var(--line); font-size: 12px; }
    .calendar-action-bar.hidden { display: none; }
    .calendar-action-label { color: var(--text-muted); }
    .calendar-action-result { color: var(--text-dim); font-family: ui-monospace, monospace; }
    .calendar-action-result[data-state="ok"]   { color: var(--ok); }
    .calendar-action-result[data-state="fail"] { color: var(--bad); }
    #status-calendar[data-state="live"]  { color: var(--ok); }
    #status-calendar[data-state="error"] { color: var(--bad); }

    /* S4: calendar settings drawer toggle in status bar */
    .status-btn {
      margin-left: 6px;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: var(--accent-soft);
      color: #cfe3ff;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .02em;
      white-space: nowrap;
    }
    .status-btn:hover { background: #234257; }
    .status-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .status-btn[aria-expanded="true"] { background: #234257; border-color: #7ab7ff; }

    /* S4: calendar settings drawer */
    .calendar-panel {
      position: fixed;
      top: var(--header-h);
      right: 0;
      width: 380px;
      max-width: 100vw;
      height: calc(100vh - var(--header-h) - var(--footer-h));
      background: var(--surface);
      border-left: 1px solid var(--line);
      overflow-y: auto;
      z-index: 50;
      box-shadow: -2px 0 8px rgba(0, 0, 0, 0.4);
    }
    .calendar-panel.hidden { display: none; }
    .calendar-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--line);
    }
    .calendar-panel-title { font-weight: 600; font-size: 14px; }
    .calendar-panel-close {
      background: transparent; border: none; color: var(--text-dim);
      font-size: 18px; cursor: pointer; padding: 0 4px;
    }
    .calendar-panel-close:hover { color: var(--text); }
    .calendar-panel-body { padding: 14px; display: flex; flex-direction: column; gap: 14px; }

    .cp-section { display: flex; flex-direction: column; gap: 6px; }
    .cp-section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
    }
    .cp-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      font-size: 13px;
    }
    .cp-key { color: var(--text-dim); }
    .cp-value { color: var(--text); font-family: ui-monospace, monospace; }

    .cp-state-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--line);
      color: var(--text-dim);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .cp-state-pill[data-state="ready"]        { background: var(--ok-soft);   color: var(--ok); }
    .cp-state-pill[data-state="not_ready"]    { background: var(--warn-soft); color: var(--warn); }
    .cp-state-pill[data-state="unconfigured"] { background: var(--line);      color: var(--warn); }
    .cp-state-pill[data-state="unsupported"]  { background: var(--bad-soft);  color: #ff9b9b; }
    .cp-state-pill[data-state="error"]        { background: var(--bad-soft);  color: var(--bad); }
    .cp-state-pill[data-state="unknown"]      { background: var(--line);      color: var(--text-dim); }

    .cp-guidance {
      background: var(--surface-2);
      border: 1px dashed var(--line-2);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #d0d2d8;
      line-height: 1.4;
    }
    .cp-reason { font-size: 12px; color: var(--warn); font-family: ui-monospace, monospace; }
    .cp-detail { font-size: 12px; color: var(--text-dim); }

    .cp-run-btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--accent);
      background: var(--accent-soft);
      color: #cfe3ff;
      cursor: pointer;
      font-size: 13px;
      align-self: flex-start;
    }
    .cp-run-btn:hover:not(:disabled) { background: #2a3d4d; }
    .cp-run-btn:disabled { opacity: .4; cursor: default; }

    .cp-result {
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .cp-result-state {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--line);
      color: var(--text-dim);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .04em;
      width: fit-content;
    }
    .cp-result-state[data-state="ok"]   { background: var(--ok-soft);  color: var(--ok); }
    .cp-result-state[data-state="fail"] { background: var(--bad-soft); color: var(--bad); }
    .cp-result-reply {
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      font-family: ui-monospace, monospace;
      font-size: 12px;
    }
    .cp-result-meta { color: var(--text-muted); font-family: ui-monospace, monospace; font-size: 11px; }

    .cp-error {
      color: #ff9b9b;
      font-size: 12px;
      background: var(--bad-soft);
      border-radius: 6px;
      padding: 6px 10px;
    }

    /* ── S3: Voice capture footer ───────────────────────────────────── */
    .voice-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      height: var(--footer-h);
      box-sizing: border-box;
      background: var(--surface-2);
      border-top: 1px solid var(--line);
      font-size: 13px;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 15;
    }

    .voice-status-badge {
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--line);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--text-dim);
      white-space: nowrap;
      min-width: 72px;
      text-align: center;
    }
    .voice-status-badge[data-state="requesting"] { background: var(--line);      color: var(--warn); }
    .voice-status-badge[data-state="recording"]  { background: var(--bad-soft);  color: var(--rec); animation: rec-pulse 1s ease-in-out infinite; }
    .voice-status-badge[data-state="processing"] { background: var(--accent-soft); color: var(--accent); }
    .voice-status-badge[data-state="sent"]       { background: var(--ok-soft);   color: var(--ok); }
    .voice-status-badge[data-state="denied"]     { background: var(--bad-soft);  color: #ff9b9b; }
    .voice-status-badge[data-state="unsupported"]{ background: var(--line);      color: var(--bad); }
    .voice-status-badge[data-state="error"]      { background: var(--bad-soft);  color: var(--bad); }

    @keyframes rec-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .45; }
    }

    /* S5: Talk is the primary action — accent-coloured, bolder, with
       a mic glyph that remains visible when the label collapses on
       narrow viewports. Stop & Send and Cancel keep their semantic
       colours (danger / muted). */
    .voice-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--line-2);
      background: var(--line);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
    }
    .voice-btn:hover:not(:disabled) { background: var(--line-2); }
    .voice-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .voice-btn:disabled { opacity: .4; cursor: default; }

    .voice-btn-start {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: #cfe3ff;
      font-weight: 600;
    }
    .voice-btn-start:hover:not(:disabled) { background: #234257; }

    .voice-btn-stop {
      background: #4a1a1a;
      border-color: #8b2222;
      color: #ff9b9b;
    }
    .voice-btn-stop:hover:not(:disabled) { background: #5a2a2a; }

    .voice-btn-cancel {
      background: transparent;
      border-color: transparent;
      color: var(--text-muted);
    }
    .voice-btn-cancel:hover:not(:disabled) { color: var(--text-dim); }

    .voice-message {
      color: var(--text-dim);
      font-size: 12px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .voice-message[data-ok="false"] { color: #ff9b9b; }
    .voice-message[data-ok="true"]  { color: var(--ok); }

    .hidden { display: none !important; }

    /* ── Chat bar ──────────────────────────────────────────────────────
       Sits between the main panels and the voice footer. Fixed above
       the voice footer so both surfaces are always reachable. */
    .chat-bar {
      position: fixed;
      bottom: var(--footer-h);
      left: 0; right: 0;
      height: var(--chat-bar-h);
      background: var(--surface-2);
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      z-index: 14;
    }
    #chat-input {
      flex: 1;
      height: 32px;
      padding: 0 10px;
      border-radius: 6px;
      border: 1px solid var(--line-2);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    #chat-input:focus { border-color: var(--accent); }
    #chat-input::placeholder { color: var(--text-muted); }
    #chat-input:disabled { opacity: .5; }
    #send-btn {
      padding: 0 14px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--accent);
      background: var(--accent-soft);
      color: #cfe3ff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    #send-btn:hover:not(:disabled) { background: #234257; }
    #send-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    #send-btn:disabled { opacity: .4; cursor: default; }

    /* ── Mobile pass (stacked panes, compact status row) ──────────────
       Below 768 px the two panes stack to a two-row grid, non-essential
       status labels collapse to their values, and the voice footer
       trims visual weight. DOM hooks are unchanged. */
    @media (max-width: 768px) {
      .status-bar { gap: 6px; padding: 6px 10px; font-size: 12px; }
      .status-divider { display: none; }
      .status-title { font-size: 12px; }
      #last-event-marker { display: none; }

      .panels {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
        padding: 6px;
        gap: 6px;
      }

      .voice-footer { padding: 6px 10px; gap: 6px; }
      .voice-btn { padding: 6px 10px; font-size: 12px; }
      .voice-message { font-size: 11px; }
    }

    @media (max-width: 640px) {
      .calendar-panel { width: 100vw; border-left: none; }
    }

    @media (max-width: 420px) {
      /* Collapse the non-recording voice buttons to icon-only so the
         Talk / Stop & Send affordance stays readable next to the
         status badge on small phones. */
      .voice-btn-label { display: none; }
    }
  </style>
</head>
<body>

  <!-- ── Status bar ────────────────────────────────────────────────────
       DOM hooks consumed by session-view.js:
         #status-core           — live / idle / loading / error label
         #status-state          — current UIRenderState.kind
         #status-session        — session id (short)
         #last-event-marker     — "last event Xs ago" badge
       Preserved from worker-wb/public/index.html where applicable. -->
  <header class="status-bar">
    <span class="status-title">Alley ai-Assistant</span>
    <span class="status-divider">|</span>
    <span class="status-item">Core: <span id="status-core" class="status-value">—</span></span>
    <span class="status-divider">|</span>
    <span class="status-item">State: <span id="status-state" class="status-value">—</span></span>
    <span class="status-divider">|</span>
    <span class="status-item">Session: <span id="status-session" class="status-value monospace">—</span></span>
    <span class="status-divider">|</span>
    <span class="status-item">Calendar: <span id="status-calendar" class="status-value">—</span></span>
    <button class="status-btn" id="calendar-panel-toggle"
            aria-controls="calendar-panel" aria-expanded="false"
            title="Open calendar settings">
      &#9881; Calendar
    </button>
    <span id="last-event-marker">—</span>
  </header>

  <!-- ── S4: Calendar settings drawer ─────────────────────────────────
       Exposes provider readiness, demo-mode guidance, and exactly one
       action trigger (calendar.list_today). Hidden by default; opened
       via #calendar-panel-toggle in the status bar.

       DOM hooks consumed by ./calendar-panel.js — do not rename. -->
  <aside id="calendar-panel" class="calendar-panel hidden"
         aria-hidden="true" aria-label="Calendar settings">
    <div class="calendar-panel-header">
      <span class="calendar-panel-title">Calendar</span>
      <button class="calendar-panel-close" id="calendar-panel-close"
              aria-label="Close calendar settings">&times;</button>
    </div>

    <div class="calendar-panel-body">

      <section class="cp-section" aria-label="Provider status">
        <span class="cp-section-label">Provider</span>
        <div class="cp-row">
          <span class="cp-key">name</span>
          <span class="cp-value" id="calendar-panel-provider">—</span>
          <span class="cp-state-pill" id="calendar-panel-state"
                data-state="unknown">—</span>
        </div>
        <div class="cp-reason hidden" id="calendar-panel-reason"></div>
        <div class="cp-detail hidden" id="calendar-panel-detail"></div>
      </section>

      <section class="cp-section" aria-label="Guidance">
        <div class="cp-guidance hidden" id="calendar-panel-guidance"></div>
      </section>

      <section class="cp-section" aria-label="Action">
        <span class="cp-section-label">Action</span>
        <div class="cp-row">
          <span class="cp-key">type</span>
          <span class="cp-value" id="calendar-panel-action-type">calendar.list_today</span>
        </div>
        <button class="cp-run-btn" id="calendar-panel-run"
                aria-label="Run calendar.list_today now">
          Run calendar.list_today
        </button>
      </section>

      <section class="cp-section" aria-label="Last result">
        <span class="cp-section-label">Last result</span>
        <div class="cp-result hidden" id="calendar-panel-result">
          <span class="cp-result-state" id="calendar-panel-result-state"
                data-state="">—</span>
          <div class="cp-result-reply" id="calendar-panel-result-reply"></div>
          <div class="cp-result-meta" id="calendar-panel-result-meta"></div>
        </div>
      </section>

      <div class="cp-error hidden" id="calendar-panel-error"></div>

    </div>
  </aside>

  <!-- S5: calendar action result bar — hidden until an invocation is present -->
  <div id="calendar-action-bar" class="calendar-action-bar hidden">
    <span class="calendar-action-label">Last calendar action:</span>
    <span id="calendar-action-result" class="calendar-action-result">—</span>
  </div>

  <main class="panels">
    <section class="pane" id="pane-transcript" aria-label="Inbound transcript">
      <div class="pane-header">
        <span class="pane-label">Transcript (inbound)</span>
      </div>
      <div class="pane-body" id="transcript-log">
        <p class="pane-placeholder">waiting for first poll…</p>
      </div>
    </section>

    <section class="pane" id="pane-response" aria-label="Outbound assistant">
      <div class="pane-header">
        <span class="pane-label">Assistant Response (outbound)</span>
      </div>
      <div class="pane-body" id="response-log">
        <p class="pane-placeholder">waiting for first poll…</p>
      </div>
    </section>
  </main>

  <!-- ── Chat input bar ───────────────────────────────────────────────
       Positioned fixed above the voice footer. Wired to sendMessage()
       exported from session-view.js — same route (/telegram/webhook). -->
  <div class="chat-bar" role="region" aria-label="Text message">
    <input
      id="chat-input"
      type="text"
      placeholder="Type a message…"
      aria-label="Type a message"
      autocomplete="off"
    />
    <button id="send-btn" aria-label="Send message">Send</button>
  </div>

  <!-- ── S3: Voice capture footer ─────────────────────────────────────
       State badge + Talk / Stop & Send / Cancel buttons + status message.
       Talk is styled as the primary action. Wired by the inline module
       script below; capture logic in voice-capture.js. -->
  <footer class="voice-footer" role="region" aria-label="Voice capture">
    <span class="voice-status-badge" id="voice-status-badge"
          data-state="idle" aria-live="polite">idle</span>

    <button class="voice-btn voice-btn-start" id="voice-btn-start"
            aria-label="Start recording">
      <span aria-hidden="true">&#127899;</span>
      <span class="voice-btn-label">Talk</span>
    </button>

    <button class="voice-btn voice-btn-stop hidden" id="voice-btn-stop"
            aria-label="Stop and send recording" disabled>
      <span aria-hidden="true">&#9632;</span>
      <span class="voice-btn-label">Stop &amp; Send</span>
    </button>

    <button class="voice-btn voice-btn-cancel hidden" id="voice-btn-cancel"
            aria-label="Cancel recording" disabled>
      <span aria-hidden="true">&#10005;</span>
      <span class="voice-btn-label">Cancel</span>
    </button>

    <span class="voice-message" id="voice-message" aria-live="polite"></span>
  </footer>

  <script type="module" src="./session-view.js"></script>
  <script type="module" src="./calendar-panel.js"></script>

  <!-- Voice capture wiring — imports voice-capture.js state machine -->
  <script type="module">
    import {
      isSupported,
      onStateChange,
      startCapture,
      stopAndSend,
      cancelCapture,
    } from './voice-capture.js';

    const el = {
      badge:  document.getElementById('voice-status-badge'),
      start:  document.getElementById('voice-btn-start'),
      stop:   document.getElementById('voice-btn-stop'),
      cancel: document.getElementById('voice-btn-cancel'),
      msg:    document.getElementById('voice-message'),
    };

    const LABELS = {
      idle:        'idle',
      requesting:  'requesting…',
      recording:   'recording',
      processing:  'sending…',
      sent:        'sent',
      denied:      'denied',
      unsupported: 'unsupported',
      error:       'error',
    };

    const MSGS = {
      idle:        '',
      requesting:  'Waiting for microphone permission…',
      recording:   'Recording — press Stop & Send when done.',
      processing:  'Sending audio to assistant…',
      denied:      'Microphone permission denied. Grant mic access in browser settings and try again.',
      unsupported: 'Voice capture is not supported in this browser. Use Chrome, Edge, or Firefox over HTTPS.',
    };

    function applyState(state, extra) {
      if (el.badge) {
        el.badge.textContent = LABELS[state] ?? state;
        el.badge.dataset.state = state;
      }

      let msg = MSGS[state] ?? '';
      let okAttr = null;

      if (state === 'sent' && extra) {
        if (extra.ok) {
          msg = 'Audio received by assistant.';
          okAttr = 'true';
        } else {
          const detail = (extra.error && (extra.error.message || extra.error.code)) || 'unknown error';
          msg = `Send failed: ${detail}`;
          okAttr = 'false';
        }
      } else if (state === 'error' && extra && extra.message) {
        msg = `Error: ${extra.message}`;
        okAttr = 'false';
      } else if (state === 'denied' && extra && extra.message) {
        msg = extra.message;
        okAttr = 'false';
      }

      if (el.msg) {
        el.msg.textContent = msg;
        if (okAttr !== null) el.msg.dataset.ok = okAttr;
        else delete el.msg.dataset.ok;
      }

      const isIdle      = state === 'idle';
      const isRecording = state === 'recording';
      const isBusy      = state === 'requesting' || state === 'processing';
      const isTerminal  = state === 'denied' || state === 'unsupported' || state === 'error';

      if (el.start) {
        el.start.disabled = !(isIdle || isTerminal);
        el.start.classList.toggle('hidden', isRecording || isBusy);
      }
      if (el.stop) {
        el.stop.disabled = !isRecording;
        el.stop.classList.toggle('hidden', !isRecording);
      }
      if (el.cancel) {
        el.cancel.disabled = isBusy;
        el.cancel.classList.toggle('hidden', isIdle || isBusy || state === 'sent');
      }
    }

    onStateChange(applyState);

    // Set initial state based on browser support
    applyState(isSupported() ? 'idle' : 'unsupported', null);

    el.start  && el.start.addEventListener('click',  () => { void startCapture(); });
    el.stop   && el.stop.addEventListener('click',   () => { void stopAndSend(); });
    el.cancel && el.cancel.addEventListener('click', () => { cancelCapture(); });
  </script>

  <!-- Chat input wiring — imports sendMessage from session-view.js -->
  <script type="module">
    import { sendMessage } from './session-view.js';

    const input = document.getElementById('chat-input');
    const btn   = document.getElementById('send-btn');

    async function submit() {
      if (!input) return;
      const text = (input.value || '').trim();
      if (!text) return;
      input.disabled = true;
      if (btn) btn.disabled = true;
      input.value = '';
      try {
        await sendMessage({ text, source: 'browser' });
      } finally {
        input.disabled = false;
        if (btn) btn.disabled = false;
        input.focus();
      }
    }

    if (input) {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); void submit(); }
      });
    }
    if (btn) btn.addEventListener('click', () => { void submit(); });
  </script>
</body>
</html>
