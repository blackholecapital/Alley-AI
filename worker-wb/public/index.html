<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Executive Assistant — Operator UI</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ── Status bar ─────────────────────────────────────────────────── -->
  <header class="status-bar" id="status-bar">
    <span class="status-title">Executive Assistant</span>
    <span class="status-divider">|</span>
    <span id="status-demo-badge" class="badge badge-live">
      LIVE
    </span>
    <span class="status-divider">|</span>
    <span class="status-item">Core: <span id="status-core" class="status-value">checking…</span></span>
    <span class="status-divider">|</span>
    <span class="status-item">Voice: <span id="status-voice" class="status-value">checking…</span></span>
    <span class="status-divider">|</span>
    <span class="status-item">Boot: <span class="status-value" id="status-boot">—</span></span>
    <span class="status-divider">|</span>
    <span class="status-item">Session: <span id="status-session" class="status-value monospace">—</span></span>
    <span class="status-divider">|</span>
    <span class="status-item">Calendar: <span id="status-calendar" class="status-value">—</span></span>
  </header>

  <!-- ── Calendar action result bar (S5) ──────────────────────────────
       Hidden until /calendar/status returns an invocation result.
       #calendar-action-result carries data-state="ok"|"fail" for styling. -->
  <div id="calendar-action-bar" class="calendar-action-bar hidden">
    <span class="calendar-action-label">Last calendar action:</span>
    <span id="calendar-action-result" class="calendar-action-result">—</span>
  </div>

  <!-- ── Main panels ────────────────────────────────────────────────── -->
  <main class="panels">

    <!-- Transcript pane -->
    <section class="pane" id="pane-transcript">
      <div class="pane-header">
        <span class="pane-label">Transcript</span>
        <button class="pane-action" onclick="clearPane('transcript-log')">Clear</button>
      </div>
      <div class="pane-body" id="transcript-log">
        <p class="pane-placeholder">User input will appear here.</p>
      </div>
    </section>

    <!-- Response pane -->
    <section class="pane" id="pane-response">
      <div class="pane-header">
        <span class="pane-label">Assistant Response</span>
        <button class="pane-action" onclick="clearPane('response-log')">Clear</button>
      </div>
      <div class="pane-body" id="response-log">
        <p class="pane-placeholder">Assistant responses will appear here.</p>
      </div>
    </section>

  </main>

  <!-- ── Input / Talk control ───────────────────────────────────────── -->
  <footer class="input-bar">
    <div class="input-row">

      <!-- Talk button -->
      <button
        id="talk-btn"
        class="talk-btn"
        title="Push to talk"
        onclick="toggleTalk()"
      >
        <span id="talk-icon">🎙</span>
        <span id="talk-label">Talk</span>
      </button>

      <!-- Text input -->
      <input
        id="text-input"
        type="text"
        class="text-input"
        placeholder="Type a message and press Enter…"
        autocomplete="off"
        onkeydown="if(event.key==='Enter') sendMessage()"
      />

      <!-- Send button -->
      <button class="send-btn" onclick="sendMessage()">Send</button>

    </div>

    <!-- Sending indicator -->
    <div id="thinking-bar" class="thinking-bar hidden">
      <span class="thinking-dot"></span>
      <span class="thinking-dot"></span>
      <span class="thinking-dot"></span>
      <span class="thinking-text">Thinking…</span>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById("status-boot").textContent = new Date().toISOString();
  </script>
</body>
</html>
