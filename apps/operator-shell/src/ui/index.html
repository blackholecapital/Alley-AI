<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Executive Assistant — Operator Shell</title>
  <style>
    /* Minimal additive styles for S3 state surfaces only.
       The existing shell layout (status bar, transcript / response panes,
       input footer) is preserved from worker-wb/public/index.html. */
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           margin: 0; background: #0f1115; color: #e6e8eb; }
    .status-bar { display: flex; gap: 12px; align-items: center;
                  padding: 8px 12px; background: #1a1d23;
                  border-bottom: 1px solid #2a2d34; font-size: 13px; }
    .status-title { font-weight: 600; }
    .status-divider { color: #555; }
    .status-item { color: #a5a9b3; }
    .status-value { color: #e6e8eb; font-variant-numeric: tabular-nums; }
    .status-value[data-state="live"]    { color: #7cdc7c; }
    .status-value[data-state="empty"]   { color: #a5a9b3; }
    .status-value[data-state="loading"] { color: #f0c674; }
    .status-value[data-state="error"]   { color: #ff6b6b; }
    .monospace { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

    #last-event-marker {
      margin-left: auto;
      padding: 2px 8px;
      border-radius: 999px;
      background: #2a2d34;
      font-size: 12px;
      color: #a5a9b3;
    }

    /* Panels shrink to make room for the voice footer (44 px) */
    .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
              padding: 8px; height: calc(100vh - 42px - 44px); box-sizing: border-box; }
    .pane { display: flex; flex-direction: column;
            background: #15181e; border: 1px solid #2a2d34;
            border-radius: 8px; min-height: 0; }
    .pane-header { padding: 8px 12px; border-bottom: 1px solid #2a2d34;
                   display: flex; align-items: center; justify-content: space-between; }
    .pane-label { font-weight: 600; font-size: 13px; }
    .pane-body { flex: 1 1 auto; overflow-y: auto; padding: 8px 12px; }
    .pane-placeholder { color: #6b6f78; font-style: italic; margin: 0; }

    .entry { padding: 6px 8px; margin: 4px 0; border-radius: 6px;
             background: #1a1d23; }
    .entry-inbound  { border-left: 3px solid #4da3ff; }
    .entry-outbound { border-left: 3px solid #7cdc7c; }
    .entry-body { white-space: pre-wrap; word-break: break-word; }
    .entry-meta { margin-top: 2px; font-size: 11px; color: #6b6f78; }

    /* S5: voice / kind badge */
    .entry-kind-badge { font-size: 10px; color: #6b6f78; margin-bottom: 2px;
                        text-transform: uppercase; letter-spacing: .04em; }

    /* S5: calendar action bar */
    .calendar-action-bar { display: flex; align-items: center; gap: 8px;
                           padding: 4px 12px; background: #1a1d23;
                           border-bottom: 1px solid #2a2d34; font-size: 12px; }
    .calendar-action-bar.hidden { display: none; }
    .calendar-action-label { color: #6b6f78; }
    .calendar-action-result { color: #a5a9b3; font-family: ui-monospace, monospace; }
    .calendar-action-result[data-state="ok"]   { color: #7cdc7c; }
    .calendar-action-result[data-state="fail"] { color: #ff6b6b; }
    #status-calendar[data-state="live"]  { color: #7cdc7c; }
    #status-calendar[data-state="error"] { color: #ff6b6b; }

    /* S4: calendar settings drawer toggle in status bar */
    .status-btn {
      margin-left: 6px;
      padding: 2px 10px;
      border-radius: 6px;
      border: 1px solid #3a3d44;
      background: #2a2d34;
      color: #e6e8eb;
      cursor: pointer;
      font-size: 12px;
    }
    .status-btn:hover { background: #3a3d44; }
    .status-btn[aria-expanded="true"] { background: #3a3d44; border-color: #4da3ff; }

    /* S4: calendar settings drawer */
    .calendar-panel {
      position: fixed;
      top: 42px;
      right: 0;
      width: 380px;
      max-width: 100vw;
      height: calc(100vh - 42px - 44px);
      background: #15181e;
      border-left: 1px solid #2a2d34;
      overflow-y: auto;
      z-index: 50;
      box-shadow: -2px 0 8px rgba(0, 0, 0, 0.4);
    }
    .calendar-panel.hidden { display: none; }
    .calendar-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: #1a1d23;
      border-bottom: 1px solid #2a2d34;
    }
    .calendar-panel-title { font-weight: 600; font-size: 14px; }
    .calendar-panel-close {
      background: transparent; border: none; color: #a5a9b3;
      font-size: 18px; cursor: pointer; padding: 0 4px;
    }
    .calendar-panel-close:hover { color: #e6e8eb; }
    .calendar-panel-body { padding: 14px; display: flex; flex-direction: column; gap: 14px; }

    .cp-section { display: flex; flex-direction: column; gap: 6px; }
    .cp-section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #6b6f78;
    }
    .cp-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      font-size: 13px;
    }
    .cp-key { color: #a5a9b3; }
    .cp-value { color: #e6e8eb; font-family: ui-monospace, monospace; }

    .cp-state-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #2a2d34;
      color: #a5a9b3;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .cp-state-pill[data-state="ready"]        { background: #1a3d1f; color: #7cdc7c; }
    .cp-state-pill[data-state="not_ready"]    { background: #3d2a1a; color: #f0c674; }
    .cp-state-pill[data-state="unconfigured"] { background: #2a2d34; color: #f0c674; }
    .cp-state-pill[data-state="unsupported"]  { background: #3d1f1f; color: #ff9b9b; }
    .cp-state-pill[data-state="error"]        { background: #3d1f1f; color: #ff6b6b; }
    .cp-state-pill[data-state="unknown"]      { background: #2a2d34; color: #a5a9b3; }

    .cp-guidance {
      background: #1a1d23;
      border: 1px dashed #3a3d44;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #d0d2d8;
      line-height: 1.4;
    }
    .cp-reason { font-size: 12px; color: #f0c674; font-family: ui-monospace, monospace; }
    .cp-detail { font-size: 12px; color: #a5a9b3; }

    .cp-run-btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #4da3ff;
      background: #1a2d3d;
      color: #cfe3ff;
      cursor: pointer;
      font-size: 13px;
      align-self: flex-start;
    }
    .cp-run-btn:hover:not(:disabled) { background: #2a3d4d; }
    .cp-run-btn:disabled { opacity: .4; cursor: default; }

    .cp-result {
      background: #1a1d23;
      border: 1px solid #2a2d34;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .cp-result-state {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      background: #2a2d34;
      color: #a5a9b3;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .04em;
      width: fit-content;
    }
    .cp-result-state[data-state="ok"]   { background: #1a3d1f; color: #7cdc7c; }
    .cp-result-state[data-state="fail"] { background: #3d1f1f; color: #ff6b6b; }
    .cp-result-reply {
      white-space: pre-wrap;
      word-break: break-word;
      color: #e6e8eb;
      font-family: ui-monospace, monospace;
      font-size: 12px;
    }
    .cp-result-meta { color: #6b6f78; font-family: ui-monospace, monospace; font-size: 11px; }

    .cp-error {
      color: #ff9b9b;
      font-size: 12px;
      background: #3d1f1f;
      border-radius: 6px;
      padding: 6px 10px;
    }

    @media (max-width: 640px) {
      .calendar-panel { width: 100vw; border-left: none; }
    }

    /* ── S3: Voice capture footer ───────────────────────────────────── */
    .voice-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      height: 44px;
      box-sizing: border-box;
      background: #1a1d23;
      border-top: 1px solid #2a2d34;
      font-size: 13px;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
    }

    .voice-status-badge {
      padding: 2px 8px;
      border-radius: 999px;
      background: #2a2d34;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #a5a9b3;
      white-space: nowrap;
      min-width: 72px;
      text-align: center;
    }
    .voice-status-badge[data-state="requesting"] { background: #2a2d34; color: #f0c674; }
    .voice-status-badge[data-state="recording"]  { background: #3d1f1f; color: #ff6b6b; animation: rec-pulse 1s ease-in-out infinite; }
    .voice-status-badge[data-state="processing"] { background: #1a2d3d; color: #4da3ff; }
    .voice-status-badge[data-state="sent"]       { background: #1a3d1f; color: #7cdc7c; }
    .voice-status-badge[data-state="denied"]     { background: #3d1f1f; color: #ff9b9b; }
    .voice-status-badge[data-state="unsupported"]{ background: #2a2d34; color: #ff6b6b; }
    .voice-status-badge[data-state="error"]      { background: #3d1f1f; color: #ff6b6b; }

    @keyframes rec-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .45; }
    }

    .voice-btn {
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid #3a3d44;
      background: #2a2d34;
      color: #e6e8eb;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    .voice-btn:hover:not(:disabled) { background: #3a3d44; }
    .voice-btn:disabled { opacity: .4; cursor: default; }

    .voice-btn-stop {
      background: #4a1a1a;
      border-color: #8b2222;
      color: #ff9b9b;
    }
    .voice-btn-stop:hover:not(:disabled) { background: #5a2a2a; }

    .voice-btn-cancel {
      background: transparent;
      border-color: transparent;
      color: #6b6f78;
    }
    .voice-btn-cancel:hover:not(:disabled) { color: #a5a9b3; }

    .voice-message {
      color: #a5a9b3;
      font-size: 12px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .voice-message[data-ok="false"] { color: #ff9b9b; }
    .voice-message[data-ok="true"]  { color: #7cdc7c; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ── Status bar ────────────────────────────────────────────────────
       DOM hooks consumed by session-view.js:
         #status-core           — live / idle / loading / error label
         #status-state          — current UIRenderState.kind
         #status-session        — session id (short)
         #last-event-marker     — "last event Xs ago" badge
       Preserved from worker-wb/public/index.html where applicable. -->
  <header class="status-bar">
    <span class="status-title">Executive Assistant</span>
    <span class="status-divider">|</span>
    <span class="status-item">Core: <span id="status-core" class="status-value">—</span></span>
    <span class="status-divider">|</span>
    <span class="status-item">State: <span id="status-state" class="status-value">—</span></span>
    <span class="status-divider">|</span>
    <span class="status-item">Session: <span id="status-session" class="status-value monospace">—</span></span>
    <span class="status-divider">|</span>
    <span class="status-item">Calendar: <span id="status-calendar" class="status-value">—</span></span>
    <button class="status-btn" id="calendar-panel-toggle"
            aria-controls="calendar-panel" aria-expanded="false"
            title="Open calendar settings">
      &#9881; Calendar
    </button>
    <span id="last-event-marker">—</span>
  </header>

  <!-- ── S4: Calendar settings drawer ─────────────────────────────────
       Exposes provider readiness, demo-mode guidance, and exactly one
       action trigger (calendar.list_today). Hidden by default; opened
       via #calendar-panel-toggle in the status bar.

       DOM hooks consumed by ./calendar-panel.js — do not rename. -->
  <aside id="calendar-panel" class="calendar-panel hidden"
         aria-hidden="true" aria-label="Calendar settings">
    <div class="calendar-panel-header">
      <span class="calendar-panel-title">Calendar</span>
      <button class="calendar-panel-close" id="calendar-panel-close"
              aria-label="Close calendar settings">&times;</button>
    </div>

    <div class="calendar-panel-body">

      <section class="cp-section" aria-label="Provider status">
        <span class="cp-section-label">Provider</span>
        <div class="cp-row">
          <span class="cp-key">name</span>
          <span class="cp-value" id="calendar-panel-provider">—</span>
          <span class="cp-state-pill" id="calendar-panel-state"
                data-state="unknown">—</span>
        </div>
        <div class="cp-reason hidden" id="calendar-panel-reason"></div>
        <div class="cp-detail hidden" id="calendar-panel-detail"></div>
      </section>

      <section class="cp-section" aria-label="Guidance">
        <div class="cp-guidance hidden" id="calendar-panel-guidance"></div>
      </section>

      <section class="cp-section" aria-label="Action">
        <span class="cp-section-label">Action</span>
        <div class="cp-row">
          <span class="cp-key">type</span>
          <span class="cp-value" id="calendar-panel-action-type">calendar.list_today</span>
        </div>
        <button class="cp-run-btn" id="calendar-panel-run"
                aria-label="Run calendar.list_today now">
          Run calendar.list_today
        </button>
      </section>

      <section class="cp-section" aria-label="Last result">
        <span class="cp-section-label">Last result</span>
        <div class="cp-result hidden" id="calendar-panel-result">
          <span class="cp-result-state" id="calendar-panel-result-state"
                data-state="">—</span>
          <div class="cp-result-reply" id="calendar-panel-result-reply"></div>
          <div class="cp-result-meta" id="calendar-panel-result-meta"></div>
        </div>
      </section>

      <div class="cp-error hidden" id="calendar-panel-error"></div>

    </div>
  </aside>

  <!-- S5: calendar action result bar — hidden until an invocation is present -->
  <div id="calendar-action-bar" class="calendar-action-bar hidden">
    <span class="calendar-action-label">Last calendar action:</span>
    <span id="calendar-action-result" class="calendar-action-result">—</span>
  </div>

  <main class="panels">
    <section class="pane" id="pane-transcript" aria-label="Inbound transcript">
      <div class="pane-header">
        <span class="pane-label">Transcript (inbound)</span>
      </div>
      <div class="pane-body" id="transcript-log">
        <p class="pane-placeholder">waiting for first poll…</p>
      </div>
    </section>

    <section class="pane" id="pane-response" aria-label="Outbound assistant">
      <div class="pane-header">
        <span class="pane-label">Assistant Response (outbound)</span>
      </div>
      <div class="pane-body" id="response-log">
        <p class="pane-placeholder">waiting for first poll…</p>
      </div>
    </section>
  </main>

  <!-- ── S3: Voice capture footer ─────────────────────────────────────
       State badge + Talk / Stop & Send / Cancel buttons + status message.
       Wired by the inline module script below; capture logic in voice-capture.js. -->
  <footer class="voice-footer" role="region" aria-label="Voice capture">
    <span class="voice-status-badge" id="voice-status-badge"
          data-state="idle" aria-live="polite">idle</span>

    <button class="voice-btn" id="voice-btn-start" aria-label="Start recording">
      &#127899; Talk
    </button>

    <button class="voice-btn voice-btn-stop hidden" id="voice-btn-stop"
            aria-label="Stop and send recording" disabled>
      &#9632; Stop &amp; Send
    </button>

    <button class="voice-btn voice-btn-cancel hidden" id="voice-btn-cancel"
            aria-label="Cancel recording" disabled>
      &#10005; Cancel
    </button>

    <span class="voice-message" id="voice-message" aria-live="polite"></span>
  </footer>

  <script type="module" src="./session-view.js"></script>
  <script type="module" src="./calendar-panel.js"></script>

  <!-- Voice capture wiring — imports voice-capture.js state machine -->
  <script type="module">
    import {
      isSupported,
      onStateChange,
      startCapture,
      stopAndSend,
      cancelCapture,
    } from './voice-capture.js';

    const el = {
      badge:  document.getElementById('voice-status-badge'),
      start:  document.getElementById('voice-btn-start'),
      stop:   document.getElementById('voice-btn-stop'),
      cancel: document.getElementById('voice-btn-cancel'),
      msg:    document.getElementById('voice-message'),
    };

    const LABELS = {
      idle:        'idle',
      requesting:  'requesting…',
      recording:   'recording',
      processing:  'sending…',
      sent:        'sent',
      denied:      'denied',
      unsupported: 'unsupported',
      error:       'error',
    };

    const MSGS = {
      idle:        '',
      requesting:  'Waiting for microphone permission…',
      recording:   'Recording — press Stop & Send when done.',
      processing:  'Sending audio to assistant…',
      denied:      'Microphone permission denied. Grant mic access in browser settings and try again.',
      unsupported: 'Voice capture is not supported in this browser. Use Chrome, Edge, or Firefox over HTTPS.',
    };

    function applyState(state, extra) {
      if (el.badge) {
        el.badge.textContent = LABELS[state] ?? state;
        el.badge.dataset.state = state;
      }

      let msg = MSGS[state] ?? '';
      let okAttr = null;

      if (state === 'sent' && extra) {
        if (extra.ok) {
          msg = 'Audio received by assistant.';
          okAttr = 'true';
        } else {
          const detail = (extra.error && (extra.error.message || extra.error.code)) || 'unknown error';
          msg = `Send failed: ${detail}`;
          okAttr = 'false';
        }
      } else if (state === 'error' && extra && extra.message) {
        msg = `Error: ${extra.message}`;
        okAttr = 'false';
      } else if (state === 'denied' && extra && extra.message) {
        msg = extra.message;
        okAttr = 'false';
      }

      if (el.msg) {
        el.msg.textContent = msg;
        if (okAttr !== null) el.msg.dataset.ok = okAttr;
        else delete el.msg.dataset.ok;
      }

      const isIdle      = state === 'idle';
      const isRecording = state === 'recording';
      const isBusy      = state === 'requesting' || state === 'processing';
      const isTerminal  = state === 'denied' || state === 'unsupported' || state === 'error';

      if (el.start) {
        el.start.disabled = !(isIdle || isTerminal);
        el.start.classList.toggle('hidden', isRecording || isBusy);
      }
      if (el.stop) {
        el.stop.disabled = !isRecording;
        el.stop.classList.toggle('hidden', !isRecording);
      }
      if (el.cancel) {
        el.cancel.disabled = isBusy;
        el.cancel.classList.toggle('hidden', isIdle || isBusy || state === 'sent');
      }
    }

    onStateChange(applyState);

    // Set initial state based on browser support
    applyState(isSupported() ? 'idle' : 'unsupported', null);

    el.start  && el.start.addEventListener('click',  () => { void startCapture(); });
    el.stop   && el.stop.addEventListener('click',   () => { void stopAndSend(); });
    el.cancel && el.cancel.addEventListener('click', () => { cancelCapture(); });
  </script>
</body>
</html>
